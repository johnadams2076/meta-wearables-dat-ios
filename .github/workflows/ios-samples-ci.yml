name: iOS Samples CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-samples-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-and-record:
    name: Build, Test, and Record
    runs-on: macos-latest
    timeout-minutes: 90

    env:
      DERIVED_DATA: ${{ github.workspace }}/DerivedData
      ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
      CAMERA_PROJECT: samples/CameraAccess/CameraAccess.xcodeproj
      CAMERA_SCHEME: CameraAccess
      DISPLAY_PROJECT: samples/DisplayAccess/DisplayAccess.xcodeproj
      DISPLAY_SCHEME: DisplayAccess
      SWIFT_EXPERIMENT_FLAGS: -enable-experimental-feature IsolatedDeinit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select simulator and boot
        shell: bash
        run: |
          set -euo pipefail

          SIM_LINE="$(xcrun simctl list devices available | grep -E "iPhone .+\([0-9A-F-]{36}\)" | head -n 1 || true)"
          if [[ -z "${SIM_LINE}" ]]; then
            echo "No available iPhone simulator found on runner."
            exit 1
          fi

          SIMULATOR_UDID="$(echo "${SIM_LINE}" | sed -E 's/.*\(([0-9A-F-]{36})\).*/\1/')"
          SIMULATOR_NAME="$(echo "${SIM_LINE}" | sed -E 's/^[[:space:]]*([^\(]+)[[:space:]]*\([0-9A-F-]{36}\).*/\1/' | xargs)"

          echo "Using simulator: ${SIMULATOR_NAME} (${SIMULATOR_UDID})"
          echo "SIMULATOR_UDID=${SIMULATOR_UDID}" >> "$GITHUB_ENV"
          echo "SIMULATOR_NAME=${SIMULATOR_NAME}" >> "$GITHUB_ENV"
          echo "DESTINATION=platform=iOS Simulator,id=${SIMULATOR_UDID},arch=arm64" >> "$GITHUB_ENV"

          xcrun simctl boot "${SIMULATOR_UDID}" || true
          xcrun simctl bootstatus "${SIMULATOR_UDID}" -b
          open -a Simulator

      - name: Prepare artifact directories
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ARTIFACTS_DIR}/logs"
          mkdir -p "${ARTIFACTS_DIR}/xcresult"
          mkdir -p "${ARTIFACTS_DIR}/video"

      - name: Build CameraAccess sample app
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild \
            -project "${CAMERA_PROJECT}" \
            -scheme "${CAMERA_SCHEME}" \
            -destination "${DESTINATION}" \
            -derivedDataPath "${DERIVED_DATA}" \
            -resultBundlePath "${ARTIFACTS_DIR}/xcresult/CameraAccessBuild.xcresult" \
            OTHER_SWIFT_FLAGS="\$(inherited) ${SWIFT_EXPERIMENT_FLAGS}" \
            build | tee "${ARTIFACTS_DIR}/logs/camera-build.log"

      - name: Build DisplayAccess sample app
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild \
            -project "${DISPLAY_PROJECT}" \
            -scheme "${DISPLAY_SCHEME}" \
            -destination "${DESTINATION}" \
            -derivedDataPath "${DERIVED_DATA}" \
            -resultBundlePath "${ARTIFACTS_DIR}/xcresult/DisplayAccessBuild.xcresult" \
            OTHER_SWIFT_FLAGS="\$(inherited) ${SWIFT_EXPERIMENT_FLAGS}" \
            build | tee "${ARTIFACTS_DIR}/logs/display-build.log"

      - name: Launch built sample apps once on simulator
        shell: bash
        run: |
          set -euo pipefail

          CAMERA_APP="${DERIVED_DATA}/Build/Products/Debug-iphonesimulator/CameraAccess.app"
          DISPLAY_APP="${DERIVED_DATA}/Build/Products/Debug-iphonesimulator/DisplayAccess.app"

          for APP in "${CAMERA_APP}" "${DISPLAY_APP}"; do
            if [[ ! -d "${APP}" ]]; then
              echo "App not found: ${APP}"
              exit 1
            fi

            BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "${APP}/Info.plist")"
            xcrun simctl install "${SIMULATOR_UDID}" "${APP}"
            xcrun simctl launch "${SIMULATOR_UDID}" "${BUNDLE_ID}" || true
            sleep 2
            xcrun simctl terminate "${SIMULATOR_UDID}" "${BUNDLE_ID}" || true
          done

      - name: Run CameraAccess unit tests (MockDeviceKit coverage)
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild \
            test \
            -project "${CAMERA_PROJECT}" \
            -scheme "${CAMERA_SCHEME}" \
            -destination "${DESTINATION}" \
            -only-testing:CameraAccessTests \
            -derivedDataPath "${DERIVED_DATA}" \
            -resultBundlePath "${ARTIFACTS_DIR}/xcresult/CameraAccessUnitTests.xcresult" \
            OTHER_SWIFT_FLAGS="\$(inherited) ${SWIFT_EXPERIMENT_FLAGS}" \
            | tee "${ARTIFACTS_DIR}/logs/camera-unit-tests.log"

      - name: Run CameraAccess UI tests and record simulator video
        shell: bash
        run: |
          set -euo pipefail

          VIDEO_PATH="${ARTIFACTS_DIR}/video/camera-ui-tests.mp4"
          RECORD_LOG_PATH="${ARTIFACTS_DIR}/logs/video-recording.log"

          cleanup() {
            if [[ -n "${REC_PID:-}" ]]; then
              kill -INT "${REC_PID}" || true
              wait "${REC_PID}" || true
            fi
          }

          trap cleanup EXIT

          xcrun simctl io "${SIMULATOR_UDID}" recordVideo "${VIDEO_PATH}" > "${RECORD_LOG_PATH}" 2>&1 &
          REC_PID=$!

          xcodebuild \
            test \
            -project "${CAMERA_PROJECT}" \
            -scheme "${CAMERA_SCHEME}" \
            -destination "${DESTINATION}" \
            -only-testing:CameraAccessUITests \
            -derivedDataPath "${DERIVED_DATA}" \
            -resultBundlePath "${ARTIFACTS_DIR}/xcresult/CameraAccessUITests.xcresult" \
            OTHER_SWIFT_FLAGS="\$(inherited) ${SWIFT_EXPERIMENT_FLAGS}" \
            | tee "${ARTIFACTS_DIR}/logs/camera-ui-tests.log"

      - name: Upload CI artifacts (logs, xcresult, and video)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-samples-ci-artifacts-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            artifacts/logs
            artifacts/xcresult
            artifacts/video
