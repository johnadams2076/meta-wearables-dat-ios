## yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CameraAccess TestFlight Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "cameraaccess-v*"

jobs:
  deploy:
    name: Build And Upload TestFlight
    runs-on: macos-latest
    environment: metawearables
    timeout-minutes: 60

    env:
      PROJECT_PATH: samples/CameraAccess/CameraAccess.xcodeproj
      SCHEME: CameraAccess
      BUILD_ROOT: ${{ github.workspace }}/.ci-build
      ARCHIVE_PATH: ${{ github.workspace }}/.ci-build/CameraAccess.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/.ci-build/export
      SIGNING_DIR: ${{ github.workspace }}/.ci-build/signing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26 if available
        uses: maxim-lobanov/setup-xcode@v1
        continue-on-error: true
        with:
          xcode-version: "26.0"

      - name: Preflight validation
        shell: bash
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
          APPSTORE_API_KEY_P8_BASE64: ${{ secrets.APPSTORE_API_KEY_P8_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}
        run: |
          set -euo pipefail

          missing=0

          [[ -n "${IOS_P12_BASE64}" ]] || { echo "Missing required secret: IOS_P12_BASE64"; missing=1; }
          [[ -n "${IOS_MOBILEPROVISION_BASE64}" ]] || { echo "Missing required secret: IOS_MOBILEPROVISION_BASE64"; missing=1; }
          [[ -n "${APPSTORE_API_KEY_P8_BASE64}" ]] || { echo "Missing required secret: APPSTORE_API_KEY_P8_BASE64"; missing=1; }
          [[ -n "${IOS_P12_PASSWORD}" ]] || { echo "Missing required secret: IOS_P12_PASSWORD"; missing=1; }
          [[ -n "${APPSTORE_KEY_ID}" ]] || { echo "Missing required secret: APPSTORE_KEY_ID"; missing=1; }
          [[ -n "${APPSTORE_ISSUER_ID}" ]] || { echo "Missing required secret: APPSTORE_ISSUER_ID"; missing=1; }
          [[ -n "${APPLE_TEAM_ID}" ]] || { echo "Missing required secret: APPLE_TEAM_ID"; missing=1; }
          [[ -n "${APP_BUNDLE_ID}" ]] || { echo "Missing required secret: APP_BUNDLE_ID"; missing=1; }

          if [[ "${missing}" -ne 0 ]]; then
            echo "One or more required secrets are missing."
            exit 1
          fi

          echo "Preflight checks passed. Starting archive/export/upload."

      - name: Validate Xcode SDK requirement
        shell: bash
        run: |
          set -euo pipefail

          XCODE_VERSION=$(xcodebuild -version | awk '/Xcode/ {print $2; exit}')
          XCODE_MAJOR=${XCODE_VERSION%%.*}

          echo "Detected Xcode version: ${XCODE_VERSION}"
          if [[ "${XCODE_MAJOR}" -lt 26 ]]; then
            echo "This runner is using Xcode ${XCODE_VERSION}."
            echo "App Store Connect now requires iOS 26 SDK (Xcode 26+)."
            echo "Use a runner image that has Xcode 26 or a self-hosted macOS runner with Xcode 26 installed."
            exit 1
          fi

      - name: Decode signing assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${SIGNING_DIR}"

          echo "${{ secrets.IOS_P12_BASE64 }}" | base64 --decode > "${SIGNING_DIR}/ios_distribution.p12"
          echo "${{ secrets.IOS_MOBILEPROVISION_BASE64 }}" | base64 --decode > "${SIGNING_DIR}/profile.mobileprovision"
          echo "${{ secrets.APPSTORE_API_KEY_P8_BASE64 }}" | base64 --decode > "${SIGNING_DIR}/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8"

      - name: Install certificate and provisioning profile
        shell: bash
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${SIGNING_DIR}/ios_distribution.p12" -P "${{ secrets.IOS_P12_PASSWORD }}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"

          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | tr -d '"')
          security default-keychain -d user -s "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          mkdir -p "${HOME}/Library/MobileDevice/Provisioning Profiles"
          cp "${SIGNING_DIR}/profile.mobileprovision" "${HOME}/Library/MobileDevice/Provisioning Profiles/"

          security cms -D -i "${SIGNING_DIR}/profile.mobileprovision" > "${SIGNING_DIR}/profile.plist"
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "${SIGNING_DIR}/profile.plist")
          echo "PROFILE_NAME=${PROFILE_NAME}" >> "${GITHUB_ENV}"

      - name: Validate provisioning profile entitlements
        shell: bash
        run: |
          set -euo pipefail

          WIFI_INFO=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.networking.wifi-info' "${SIGNING_DIR}/profile.plist" 2>/dev/null || true)
          HOTSPOT=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.networking.HotspotConfiguration' "${SIGNING_DIR}/profile.plist" 2>/dev/null || true)

          if [[ "${WIFI_INFO}" != "true" || "${HOTSPOT}" != "true" ]]; then
            echo "Provisioning profile is missing required entitlements."
            echo "Required: com.apple.developer.networking.wifi-info=true and com.apple.developer.networking.HotspotConfiguration=true"
            echo "Fix in Apple Developer: enable both capabilities on App ID ${APP_BUNDLE_ID}, regenerate App Store profile, re-upload IOS_MOBILEPROVISION_BASE64."
            exit 1
          fi

          echo "Provisioning profile entitlements look valid."

      - name: Set CI build number
        shell: bash
        run: |
          set -euo pipefail

          # Use UTC timestamp so every upload gets a fresh TestFlight build number.
          BUILD_NUMBER="$(date -u +%Y%m%d%H%M%S)"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> "${GITHUB_ENV}"
          echo "Using build number: ${BUILD_NUMBER}"

      - name: Build app for iOS devices (Release)
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild \
            -project "${PROJECT_PATH}" \
            -scheme "${SCHEME}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CURRENT_PROJECT_VERSION="${BUILD_NUMBER}" \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Archive app for iOS devices
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild \
            -project "${PROJECT_PATH}" \
            -scheme "${SCHEME}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "${ARCHIVE_PATH}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            PRODUCT_BUNDLE_IDENTIFIER="${{ secrets.APP_BUNDLE_ID }}" \
            CURRENT_PROJECT_VERSION="${BUILD_NUMBER}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${PROFILE_NAME}" \
            clean archive

      - name: Export IPA
        shell: bash
        run: |
          set -euo pipefail

          cat > "${SIGNING_DIR}/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                <key>${{ secrets.APP_BUNDLE_ID }}</key>
                <string>${PROFILE_NAME}</string>
              </dict>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
            </dict>
          </plist>
          EOF

          mkdir -p "${EXPORT_PATH}"

          xcodebuild \
            -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportPath "${EXPORT_PATH}" \
            -exportOptionsPlist "${SIGNING_DIR}/ExportOptions.plist"

          IPA_PATH=$(find "${EXPORT_PATH}" -maxdepth 1 -name "*.ipa" | head -n 1)
          if [[ -z "${IPA_PATH}" ]]; then
            echo "No IPA was exported."
            exit 1
          fi
          echo "IPA_PATH=${IPA_PATH}" >> "${GITHUB_ENV}"

      - name: Upload IPA to TestFlight
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.appstoreconnect/private_keys"
          cp "${SIGNING_DIR}/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8" "${HOME}/.appstoreconnect/private_keys/"

          xcrun altool \
            --upload-app \
            --type ios \
            --file "${IPA_PATH}" \
            --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}" \
            --verbose

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: cameraaccess-ipa
          path: ${{ env.IPA_PATH }}
          if-no-files-found: error